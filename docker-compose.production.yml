services:
  frontend:
build:
  context: .
  dockerfile: ./compose/production/Dockerfile
  args:
    - VITE_API_URL=${VITE_API_URL:-/api}

environment:
  - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - '8000:80'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
